<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow:hidden}

/* ── Theme ── */
:root{
  --bg:#13131f;--surf:#1c1c2e;--surf2:#262640;--text:#e0e0f0;
  --muted:#8888aa;--border:#333355;--ws:#181828;
  --grid:rgba(255,255,255,.025);--drop:rgba(76,151,255,.12);
}
.light{
  --bg:#f0f2f5;--surf:#fff;--surf2:#e8eaed;--text:#1a1a2e;
  --muted:#666680;--border:#d0d0e0;--ws:#fafbfd;
  --grid:rgba(0,0,0,.035);--drop:rgba(76,151,255,.08);
}

/* ── Layout ── */
#app{display:flex;height:100vh;background:var(--bg);color:var(--text)}

/* ── Palette ── */
#palette{width:170px;background:var(--surf);border-right:1px solid var(--border);
  overflow-y:auto;padding:10px 8px;flex-shrink:0}
.pal-hdr{font-size:14px;font-weight:800;padding:6px 4px 10px;color:var(--text)}
.pal-cat{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;
  color:var(--muted);padding:12px 4px 3px}
.pal-node{display:flex;align-items:center;gap:7px;padding:7px 9px;margin:3px 0;
  border-radius:7px;font-size:11.5px;font-weight:600;color:#fff;cursor:grab;
  user-select:none;transition:transform .1s,box-shadow .1s}
.pal-node:hover{transform:scale(1.05);box-shadow:0 4px 14px rgba(0,0,0,.35)}
.pal-node:active{cursor:grabbing;transform:scale(.97)}
.pal-icon{font-size:15px}

/* ── Workspace area ── */
#ws-area{flex:1;display:flex;flex-direction:column;min-width:0}

#toolbar{display:flex;align-items:center;gap:8px;padding:7px 14px;
  background:var(--surf);border-bottom:1px solid var(--border)}
#toolbar button{padding:5px 14px;border:none;border-radius:6px;font-size:11.5px;
  font-weight:700;cursor:pointer;transition:background .12s}
#run-btn{background:#22c55e;color:#fff}
#run-btn:hover{background:#16a34a}
#run-btn:disabled{opacity:.4;cursor:default}
#clear-btn{background:var(--surf2);color:var(--text)}
#clear-btn:hover{background:var(--border)}
.tb-spacer{flex:1}
#node-ct{font-size:10px;color:var(--muted)}

#workspace{flex:1;overflow-y:auto;padding:28px 36px;background:var(--ws);
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:24px 24px;position:relative}

/* ── Empty state ── */
#empty{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;color:var(--muted);pointer-events:none}
#empty .e-icon{font-size:52px;margin-bottom:10px}
#empty .e-title{font-size:15px;font-weight:700}
#empty .e-hint{font-size:12px;margin-top:5px}

/* ── Drop indicator ── */
#drop-ind{height:3px;background:#4C97FF;border-radius:2px;margin:4px 0;
  display:none;box-shadow:0 0 8px rgba(76,151,255,.5)}
.ws-dragover #drop-ind{display:block}

/* ── Blocks ── */
.bw{margin-bottom:0;position:relative;transition:opacity .15s;max-width:380px}
.bw.dragging{opacity:.3}
.bw.fadeIn{animation:fadeIn .2s ease-out}

.block{border-radius:10px;overflow:hidden;border:2px solid var(--border);
  background:var(--surf);cursor:pointer;transition:box-shadow .15s,transform .1s;
  position:relative}
.block:hover{box-shadow:0 4px 18px rgba(0,0,0,.2);transform:translateY(-1px)}
.block.selected{box-shadow:0 0 0 3px rgba(76,151,255,.5),0 4px 18px rgba(0,0,0,.2)}

.b-head{padding:8px 30px 8px 12px;display:flex;align-items:center;gap:7px;color:#fff;
  font-weight:700;font-size:12.5px}
.b-icon{font-size:16px}
.b-num{margin-left:auto;font-size:9px;opacity:.6;font-weight:600}

.b-body{padding:8px 12px 7px}
.b-desc{font-size:10px;color:var(--muted);line-height:1.3}

.b-io{background:rgba(0,0,0,.08);border-radius:6px;padding:5px 8px;margin-top:6px;
  font-size:10px;font-family:'Cascadia Code','Fira Code',monospace;line-height:1.5}
.light .b-io{background:rgba(0,0,0,.04)}
.io-in{color:#60a5fa}.io-out{color:#4ade80}.io-lbl{opacity:.5}

.b-err{background:rgba(220,38,38,.15);border:1px solid rgba(248,113,113,.4);
  border-radius:6px;padding:5px 8px;margin-top:6px;font-size:10px;color:#fca5a5;line-height:1.4}

.b-stat{text-align:right;font-size:9.5px;margin-top:4px;color:var(--muted)}

.b-del{position:absolute;top:6px;right:7px;width:18px;height:18px;display:flex;
  align-items:center;justify-content:center;border-radius:50%;background:rgba(0,0,0,.2);
  color:#fff;font-size:13px;cursor:pointer;opacity:0;transition:opacity .12s,background .12s;z-index:3}
.block:hover .b-del{opacity:1}
.b-del:hover{background:rgba(220,38,38,.7)}

.b-gear{position:absolute;top:6px;right:28px;width:18px;height:18px;display:flex;
  align-items:center;justify-content:center;border-radius:50%;background:rgba(0,0,0,.2);
  color:#fff;font-size:11px;cursor:pointer;opacity:0;transition:opacity .12s,background .12s;z-index:3}
.block:hover .b-gear{opacity:1}
.b-gear:hover{background:rgba(255,255,255,.25)}
.b-gear.has-settings{opacity:.7;background:rgba(255,171,25,.3)}
.block:hover .b-gear.has-settings{opacity:1}

/* ── Settings form in inspector ── */
.ins-setting{margin-bottom:10px}
.ins-setting label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.4px;color:var(--muted);margin-bottom:3px}
.ins-setting textarea{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;
  background:var(--surf2);color:var(--text);font-size:11px;font-family:inherit;resize:vertical;
  min-height:60px;line-height:1.4}
.ins-setting input[type=number]{width:80px;padding:5px 8px;border:1px solid var(--border);
  border-radius:6px;background:var(--surf2);color:var(--text);font-size:11px;font-family:inherit}
.ins-range-wrap{display:flex;align-items:center;gap:8px}
.ins-range-wrap input[type=range]{flex:1;accent-color:#FFAB19}
.ins-range-val{font-size:11px;color:var(--text);min-width:32px;text-align:right;
  font-family:'Cascadia Code',monospace}
.ins-reset{margin-top:8px;padding:4px 12px;border:1px solid var(--border);border-radius:5px;
  background:var(--surf2);color:var(--muted);font-size:10px;cursor:pointer;transition:background .12s}
.ins-reset:hover{background:var(--border);color:var(--text)}
.ins-settings-hdr{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.ins-settings-hdr .ins-title{margin-bottom:0}
.ins-back{padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:var(--surf2);
  color:var(--text);font-size:10px;cursor:pointer;margin-left:auto}
.ins-back:hover{background:var(--border)}

/* ── Connector line ── */
.conn{display:flex;align-items:center;gap:0;padding:0 0 0 28px;height:28px}
.conn-line{width:2px;height:28px;background:var(--border)}
.conn-dot{width:8px;height:8px;border-radius:50%;border:2px solid var(--border);
  background:var(--surf);margin-left:-5px}
.conn-label{font-size:9px;color:var(--muted);margin-left:8px;
  background:var(--surf2);padding:1px 6px;border-radius:3px}

/* ── Block states ── */
.bw.success .block{border-color:#22c55e}
.bw.success .conn-line{background:#22c55e}
.bw.success .conn-dot{border-color:#22c55e}
.bw.error .block{border-color:#ef4444;animation:shake .4s ease-out}
.bw.error .conn-line{background:#ef4444}
.bw.error .conn-dot{border-color:#ef4444}
.bw.running .block{animation:pulse 1s ease-in-out infinite}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* ── Inspector ── */
#inspector{width:250px;background:var(--surf);border-left:1px solid var(--border);
  overflow-y:auto;padding:14px;flex-shrink:0}
.ins-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:var(--muted);margin-bottom:10px}
.ins-sec{margin-bottom:14px}
.ins-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  color:var(--muted);margin-bottom:4px}
.ins-val{font-size:11px;color:var(--text);background:var(--surf2);border-radius:6px;
  padding:8px 10px;font-family:'Cascadia Code',monospace;white-space:pre-wrap;
  word-break:break-word;max-height:160px;overflow-y:auto;line-height:1.4}
.ins-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10.5px;font-weight:600}
.ins-badge.ok{background:rgba(34,197,94,.15);color:#4ade80}
.ins-badge.err{background:rgba(239,68,68,.15);color:#f87171}
.ins-sel,.ins-inp{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;
  background:var(--surf2);color:var(--text);font-size:11.5px;margin-top:3px;font-family:inherit}
.ins-inp{resize:vertical;min-height:50px}
.ins-nav{display:flex;gap:4px;margin-top:4px}
.ins-nav button{flex:1;padding:4px;border:1px solid var(--border);border-radius:4px;
  background:var(--surf2);color:var(--text);cursor:pointer;font-size:11px}
.ins-nav button:hover{background:var(--border)}
.ins-nav button:disabled{opacity:.3;cursor:default}
.ins-preview{font-size:10.5px;color:var(--text);background:var(--surf2);border-radius:6px;
  padding:8px;margin-top:6px;max-height:80px;overflow-y:auto;line-height:1.4;font-style:italic}
</style>
</head>
<body>
<div id="app">
  <aside id="palette"></aside>
  <div id="ws-area">
    <div id="toolbar">
      <button id="run-btn" title="Execute pipeline">&#9654; Run</button>
      <button id="clear-btn" title="Remove all blocks">&#128465; Clear</button>
      <span class="tb-spacer"></span>
      <span id="node-ct"></span>
    </div>
    <div id="workspace">
      <div id="empty">
        <div class="e-icon">&#129513;</div>
        <div class="e-title">Drag blocks here to build a pipeline</div>
        <div class="e-hint">or double-click a block in the palette</div>
      </div>
      <div id="block-stack"></div>
      <div id="drop-ind"></div>
    </div>
  </div>
  <aside id="inspector"><div id="ins-c"></div></aside>
</div>

<script>
/* ── Streamlit Component Library Shim ──────────────────────
   Implements the postMessage protocol so declare_component
   can communicate bidirectionally with this iframe.        */
(function(){
  const _events = new EventTarget();
  function _post(msg){
    msg.isStreamlitMessage=true;
    window.parent.postMessage(msg,"*");
  }
  const Streamlit = {
    RENDER_EVENT: "streamlit:render",
    events: _events,
    setComponentReady: function(){
      _post({type:"streamlit:componentReady", apiVersion:1});
    },
    setComponentValue: function(value){
      _post({type:"streamlit:setComponentValue", value:JSON.parse(JSON.stringify(value))});
    },
    setFrameHeight: function(height){
      _post({type:"streamlit:setFrameHeight", height: height || document.body.scrollHeight});
    }
  };
  window.addEventListener("message",function(event){
    if(event.data && event.data.type==="streamlit:render"){
      var e=new CustomEvent(Streamlit.RENDER_EVENT,{
        detail:{args:event.data.args||{},disabled:event.data.disabled,theme:event.data.theme}
      });
      _events.dispatchEvent(e);
    }
  });
  window.Streamlit=Streamlit;
})();

/* ═══════════════════════════════════════════════════════════
   TECHNIQUE COMPOSER — LangChain-flow Visual Pipeline Engine
   ═══════════════════════════════════════════════════════════ */

const S={nodeTypes:{},datasets:{},pipeline:[],results:{},theme:'dark',
  sel:null,settingsMode:null,ds:'',dsIdx:0,query:'',custom:'',nodeSettings:{}};
const CAT_COLORS={data:{c:'#4C97FF',d:'#3373CC'},ingest:{c:'#9966FF',d:'#774DCB'},
  evolution:{c:'#CF63CF',d:'#A63DA6'},retrieval:{c:'#59C059',d:'#389438'},
  generation:{c:'#FFAB19',d:'#CF8B17'}};
const CAT_ORDER=['data','ingest','evolution','retrieval','generation'];
const CAT_LABELS={data:'Data',ingest:'Ingest',evolution:'Evolve',retrieval:'Retrieve',generation:'Generate'};

/* ── Per-node-type settings schema ── */
const NODE_SETTINGS_SCHEMA={
  'llm-distiller':[
    {key:'prompt',label:'Distil Prompt',type:'textarea',
      default:'You are a TOON memory encoder. Convert the following text into a structured TOON atomic note with key:value fields.'},
    {key:'temperature',label:'Temperature',type:'range',min:0,max:2,step:0.1,default:0.7},
    {key:'max_tokens',label:'Max Tokens',type:'number',min:50,max:4000,default:500},
  ],
  'heuristic-distiller':[
    {key:'max_keywords',label:'Max Keywords',type:'number',min:1,max:30,default:8},
    {key:'min_confidence',label:'Min Confidence',type:'range',min:0,max:1,step:0.05,default:0.5},
  ],
  'stage1-prescreen':[
    {key:'threshold',label:'Contradiction Sensitivity',type:'range',min:0,max:1,step:0.05,default:0.5},
  ],
  'stage2-judge':[
    {key:'prompt',label:'Judge Prompt',type:'textarea',
      default:'Classify the relationship between the two notes as one of: CONTRADICTS, EXTENDS, SUPPORTS, UNRELATED.'},
    {key:'temperature',label:'Temperature',type:'range',min:0,max:2,step:0.1,default:0.3},
  ],
  'confidence-engine':[
    {key:'decay_factor',label:'Decay Factor',type:'range',min:0,max:1,step:0.05,default:0.1},
    {key:'boost_factor',label:'Boost Factor',type:'range',min:0,max:1,step:0.05,default:0.2},
  ],
  'belief-propagator':[
    {key:'max_hops',label:'Max Propagation Hops',type:'number',min:1,max:10,default:3},
    {key:'weight_decay',label:'Weight Decay',type:'range',min:0,max:1,step:0.05,default:0.5},
  ],
  'vector-seeder':[
    {key:'top_k',label:'Top K Results',type:'number',min:1,max:50,default:5},
    {key:'threshold',label:'Similarity Threshold',type:'range',min:0,max:1,step:0.05,default:0.3},
  ],
  'graph-walker':[
    {key:'max_hops',label:'Max Hops',type:'number',min:1,max:10,default:3},
    {key:'min_confidence',label:'Min Confidence',type:'range',min:0,max:1,step:0.05,default:0.3},
  ],
  'answer-generator':[
    {key:'prompt',label:'Answer Prompt',type:'textarea',
      default:'Answer the question using only the provided context. Be concise and factual.'},
    {key:'temperature',label:'Temperature',type:'range',min:0,max:2,step:0.1,default:0.7},
    {key:'max_tokens',label:'Max Tokens',type:'number',min:50,max:4000,default:500},
  ],
};

function uid(){return Math.random().toString(36).substr(2,8)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function trn(s,n){return s&&s.length>n?s.slice(0,n)+'\u2026':(s||'\u2014')}

/* ── Render ── */
function render(){
  document.getElementById('app').className=S.theme==='light'?'light':'';
  renderPalette();renderWorkspace();renderInspector();
  document.getElementById('node-ct').textContent=
    S.pipeline.length?S.pipeline.length+' node'+(S.pipeline.length>1?'s':''):'';
  document.getElementById('run-btn').disabled=!S.pipeline.length;
  raf(()=>{if(window.Streamlit)Streamlit.setFrameHeight(
    Math.max(560,document.getElementById('app').scrollHeight))});
}
function raf(fn){requestAnimationFrame(fn)}

function renderPalette(){
  const el=document.getElementById('palette');
  let h='<div class="pal-hdr">Blocks</div>';
  CAT_ORDER.forEach(cat=>{
    const types=Object.entries(S.nodeTypes).filter(([,t])=>t.category===cat);
    if(!types.length)return;
    const cc=CAT_COLORS[cat]||CAT_COLORS.data;
    h+=`<div class="pal-cat">${CAT_LABELS[cat]}</div>`;
    types.forEach(([k,t])=>{
      h+=`<div class="pal-node" draggable="true" data-type="${k}" style="background:${cc.c}" title="${esc(t.tip||'')}">
        <span class="pal-icon">${t.icon}</span><span>${esc(t.name)}</span></div>`;
    });
  });
  el.innerHTML=h;
  el.querySelectorAll('.pal-node').forEach(p=>{
    p.addEventListener('dragstart',e=>{
      e.dataTransfer.setData('text/plain',p.dataset.type);
      e.dataTransfer.effectAllowed='copy';p.style.opacity='.5';});
    p.addEventListener('dragend',()=>{p.style.opacity='1'});
    p.addEventListener('dblclick',()=>addNode(p.dataset.type));
  });
}

function renderWorkspace(){
  const stack=document.getElementById('block-stack');
  document.getElementById('empty').style.display=S.pipeline.length?'none':'block';
  let h='';
  S.pipeline.forEach((node,i)=>{
    const t=S.nodeTypes[node.type]||{};
    const cc=CAT_COLORS[t.category]||CAT_COLORS.data;
    const r=S.results[node.id];
    let cls='bw fadeIn',io='',err='',stat='';

    if(r){
      if(r.status==='success'){
        cls+=' success';
        io=`<div class="b-io">
          <div class="io-in"><span class="io-lbl">IN: </span>${esc(trn(r.in_preview,60))}</div>
          <div class="io-out"><span class="io-lbl">OUT: </span>${esc(trn(r.out_preview,60))}</div></div>`;
        stat=`<div class="b-stat">\u2705 ${Math.round(r.ms||0)}ms</div>`;
      }else if(r.status==='error'){
        cls+=' error';
        err=`<div class="b-err">\u26a0 ${esc(trn(r.error||'Unknown error',120))}</div>`;
        stat=`<div class="b-stat">\u274c failed</div>`;
      }
    }
    const sel=node.id===S.sel?' selected':'';

    // Connector line (before every block except first)
    if(i>0){
      const prev=S.nodeTypes[S.pipeline[i-1].type]||{};
      h+=`<div class="conn" style="--c:${CAT_COLORS[prev.category||'data']?.c||'#666'}">
        <div class="conn-line"></div><div class="conn-dot"></div>
        <span class="conn-label">${prev.out_type||'any'}</span></div>`;
    }

    const hasCustom=S.nodeSettings[node.id]&&Object.keys(S.nodeSettings[node.id]).length>0;
    const gearCls='b-gear'+(hasCustom?' has-settings':'');
    const hasSchema=!!NODE_SETTINGS_SCHEMA[node.type];

    h+=`<div class="${cls}" data-id="${node.id}" data-idx="${i}" draggable="true">
      <div class="block${sel}" onclick="selectNode('${node.id}')">
        <div class="b-del" onclick="event.stopPropagation();removeNode('${node.id}')">\u00d7</div>
        ${hasSchema?`<div class="${gearCls}" onclick="event.stopPropagation();openSettings('${node.id}')" title="Node settings">\u2699</div>`:''}
        <div class="b-head" style="background:${cc.c}">
          <span class="b-icon">${t.icon||'?'}</span>
          <span>${esc(t.name||node.type)}</span>
          <span class="b-num">#${i+1}</span>
        </div>
        <div class="b-body">
          <div class="b-desc">${esc(t.tip||'')}</div>
          ${io}${err}${stat}
        </div>
      </div>
    </div>`;
  });
  stack.innerHTML=h;

  // Drag-reorder within workspace
  stack.querySelectorAll('.bw').forEach(bw=>{
    bw.addEventListener('dragstart',e=>{
      e.dataTransfer.setData('application/block-id',bw.dataset.id);
      e.dataTransfer.effectAllowed='move';
      setTimeout(()=>bw.classList.add('dragging'),0);
    });
    bw.addEventListener('dragend',()=>{
      bw.classList.remove('dragging');
      document.getElementById('workspace').classList.remove('ws-dragover');
      document.getElementById('drop-ind').style.display='none';
    });
  });
}

function renderInspector(){
  const el=document.getElementById('ins-c');

  /* ── Settings mode ── */
  if(S.settingsMode){
    const node=S.pipeline.find(n=>n.id===S.settingsMode);
    if(!node){S.settingsMode=null;renderInspector();return}
    const t=S.nodeTypes[node.type]||{};
    const schema=NODE_SETTINGS_SCHEMA[node.type]||[];
    const hasCustom=S.nodeSettings[node.id]&&Object.keys(S.nodeSettings[node.id]).length>0;
    let h=`<div class="ins-settings-hdr">
      <div class="ins-title">\u2699 ${esc(t.name||'')}</div>
      <button class="ins-back" onclick="closeSettings()">\u2190 Back</button></div>`;

    if(!schema.length){
      h+=`<div style="font-size:11px;color:var(--muted)">No configurable settings for this block.</div>`;
    }else{
      schema.forEach(s=>{
        const val=getNodeSetting(node.id,s.key);
        h+=`<div class="ins-setting"><label>${esc(s.label)}</label>`;
        if(s.type==='textarea'){
          h+=`<textarea onchange="setNodeSetting('${node.id}','${s.key}',this.value)">${esc(String(val||''))}</textarea>`;
        }else if(s.type==='number'){
          h+=`<input type="number" value="${val}" min="${s.min||0}" max="${s.max||9999}" step="${s.step||1}"
            onchange="setNodeSetting('${node.id}','${s.key}',parseFloat(this.value))">`;
        }else if(s.type==='range'){
          h+=`<div class="ins-range-wrap">
            <input type="range" value="${val}" min="${s.min||0}" max="${s.max||1}" step="${s.step||0.1}"
              oninput="this.nextElementSibling.textContent=this.value"
              onchange="setNodeSetting('${node.id}','${s.key}',parseFloat(this.value))">
            <span class="ins-range-val">${val}</span></div>`;
        }
        h+=`</div>`;
      });
      if(hasCustom){
        h+=`<button class="ins-reset" onclick="resetNodeSettings('${node.id}')">↺ Reset to defaults</button>`;
      }
    }
    el.innerHTML=h;
    return;
  }

  if(S.sel){
    const node=S.pipeline.find(n=>n.id===S.sel);
    if(!node){S.sel=null;renderInspector();return}
    const t=S.nodeTypes[node.type]||{};
    const cc=CAT_COLORS[t.category]||CAT_COLORS.data;
    const r=S.results[node.id];
    const hasSchema=!!NODE_SETTINGS_SCHEMA[node.type];
    let h=`<div class="ins-title">${t.icon||''} ${esc(t.name||'')}</div>`;
    if(hasSchema){
      h+=`<div class="ins-sec"><button class="ins-reset" style="margin-top:0" onclick="openSettings('${node.id}')">\u2699 Settings</button></div>`;
    }
    if(r){
      h+=`<div class="ins-sec"><div class="ins-lbl">Status</div>
        <span class="ins-badge ${r.status==='success'?'ok':'err'}">
        ${r.status==='success'?'\u2705 Success':'\u274c Error'}${r.ms?' \u2014 '+Math.round(r.ms)+'ms':''}</span></div>`;
      if(r.status==='error'&&r.error)
        h+=`<div class="ins-sec"><div class="ins-lbl">Error</div>
          <div class="ins-val" style="color:#f87171">${esc(r.error)}</div></div>`;
      h+=`<div class="ins-sec"><div class="ins-lbl">Input</div>
        <div class="ins-val">${esc(r.in_preview||'\u2014')}</div></div>`;
      h+=`<div class="ins-sec"><div class="ins-lbl">Output</div>
        <div class="ins-val">${esc(r.out_preview||'\u2014')}</div></div>`;
    }else{
      h+=`<div class="ins-sec"><div class="ins-lbl">Description</div>
        <div style="font-size:12px">${esc(t.tip||'')}</div></div>
        <div class="ins-sec" style="font-size:11px;color:var(--muted)">
        Run the pipeline to see I/O data.</div>`;
    }
    el.innerHTML=h;
  }else{
    // Pipeline input controls
    let dsOpts='<option value="">Custom text</option>';
    Object.keys(S.datasets).forEach(n=>{
      dsOpts+=`<option value="${esc(n)}"${n===S.ds?' selected':''}>${esc(n)}</option>`;
    });
    const items=S.ds&&S.datasets[S.ds]?S.datasets[S.ds]:[];
    const txt=items.length?items[Math.min(S.dsIdx,items.length-1)]:'';
    let h=`<div class="ins-title">Pipeline Input</div>
      <div class="ins-sec"><div class="ins-lbl">Dataset</div>
        <select class="ins-sel" onchange="onDsChange(this.value)">${dsOpts}</select></div>`;
    if(S.ds&&items.length){
      h+=`<div class="ins-sec"><div class="ins-lbl">Item ${S.dsIdx+1} / ${items.length}</div>
        <div class="ins-nav">
          <button onclick="navItem(-1)" ${S.dsIdx<=0?'disabled':''}>&#9664; Prev</button>
          <button onclick="navItem(1)" ${S.dsIdx>=items.length-1?'disabled':''}>Next &#9654;</button>
        </div>
        <div class="ins-preview">"${esc(trn(txt,200))}"</div></div>`;
    }else{
      h+=`<div class="ins-sec"><div class="ins-lbl">Custom Text</div>
        <textarea class="ins-inp" placeholder="Type or paste text\u2026"
          onchange="S.custom=this.value">${esc(S.custom)}</textarea></div>`;
    }
    h+=`<div class="ins-sec"><div class="ins-lbl">Query</div>
      <textarea class="ins-inp" placeholder="Question for retrieval\u2026" style="min-height:40px"
        onchange="S.query=this.value">${esc(S.query)}</textarea></div>`;
    const rk=Object.keys(S.results);
    if(rk.length){
      const ok=rk.filter(k=>S.results[k].status==='success').length;
      const er=rk.filter(k=>S.results[k].status==='error').length;
      const ms=rk.reduce((a,k)=>a+(S.results[k].ms||0),0);
      h+=`<div class="ins-sec"><div class="ins-lbl">Last Run</div>
        <div style="font-size:12px">\u2705 ${ok} passed &nbsp;\u274c ${er} failed<br>
        \u23f1 ${Math.round(ms)}ms total</div></div>`;
    }
    el.innerHTML=h;
  }
}

/* ── Actions ── */
function addNode(type,at){
  const n={id:uid(),type};
  if(at!==undefined&&at<S.pipeline.length)S.pipeline.splice(at,0,n);
  else S.pipeline.push(n);
  S.results={};render();notify('update');
}
function removeNode(id){
  S.pipeline=S.pipeline.filter(n=>n.id!==id);
  if(S.sel===id)S.sel=null;
  if(S.settingsMode===id)S.settingsMode=null;
  delete S.nodeSettings[id];
  S.results={};render();notify('update');
}
function selectNode(id){S.sel=S.sel===id?null:id;S.settingsMode=null;render()}
function openSettings(id){S.sel=id;S.settingsMode=id;render()}
function closeSettings(){S.settingsMode=null;render()}
function getNodeSetting(nodeId,key){
  const node=S.pipeline.find(n=>n.id===nodeId);
  if(!node)return undefined;
  const schema=(NODE_SETTINGS_SCHEMA[node.type]||[]).find(s=>s.key===key);
  if(S.nodeSettings[nodeId]&&S.nodeSettings[nodeId][key]!==undefined)return S.nodeSettings[nodeId][key];
  return schema?schema.default:undefined;
}
function setNodeSetting(nodeId,key,value){
  if(!S.nodeSettings[nodeId])S.nodeSettings[nodeId]={};
  S.nodeSettings[nodeId][key]=value;
  render();notify('update');
}
function resetNodeSettings(nodeId){
  delete S.nodeSettings[nodeId];
  render();notify('update');
}
function moveNode(from,to){
  if(from===to)return;
  const[n]=S.pipeline.splice(from,1);S.pipeline.splice(to,0,n);
  S.results={};render();notify('update');
}
function clearAll(){S.pipeline=[];S.results={};S.sel=null;render();notify('update')}
function runPipeline(){
  if(!S.pipeline.length)return;
  S.pipeline.forEach(n=>{
    const el=document.querySelector(`[data-id="${n.id}"]`);
    if(el)el.classList.add('running');
  });
  notify('run');
}
function onDsChange(v){S.ds=v;S.dsIdx=0;renderInspector()}
function navItem(d){
  const items=S.datasets[S.ds]||[];
  S.dsIdx=Math.max(0,Math.min(items.length-1,S.dsIdx+d));renderInspector();
}

/* ── Drag & Drop ── */
const ws=document.getElementById('workspace');
const di=document.getElementById('drop-ind');
const stk=document.getElementById('block-stack');

function getInsIdx(y){
  const bws=[...stk.querySelectorAll('.bw:not(.dragging)')];
  for(let i=0;i<bws.length;i++){
    const r=bws[i].getBoundingClientRect();
    if(y<r.top+r.height/2)return i;
  }
  return bws.length;
}
ws.addEventListener('dragover',e=>{
  e.preventDefault();
  e.dataTransfer.dropEffect=e.dataTransfer.types.includes('application/block-id')?'move':'copy';
  ws.classList.add('ws-dragover');
  const idx=getInsIdx(e.clientY);
  const bws=[...stk.querySelectorAll('.bw:not(.dragging)')];
  if(idx<bws.length)stk.insertBefore(di,bws[idx]);
  else stk.appendChild(di);
  di.style.display='block';
});
ws.addEventListener('dragleave',e=>{
  if(!ws.contains(e.relatedTarget)){ws.classList.remove('ws-dragover');di.style.display='none'}
});
ws.addEventListener('drop',e=>{
  e.preventDefault();ws.classList.remove('ws-dragover');di.style.display='none';
  const bid=e.dataTransfer.getData('application/block-id');
  const ntype=e.dataTransfer.getData('text/plain');
  const idx=getInsIdx(e.clientY);
  if(bid){
    const fi=S.pipeline.findIndex(n=>n.id===bid);
    if(fi>=0)moveNode(fi,idx>fi?idx-1:idx);
  }else if(ntype&&S.nodeTypes[ntype]){
    addNode(ntype,idx);
  }
});

/* ── Toolbar ── */
document.getElementById('run-btn').addEventListener('click',runPipeline);
document.getElementById('clear-btn').addEventListener('click',clearAll);

/* ── Streamlit Communication ── */
// _skipRenders: counter of how many incoming renders to skip pipeline
// acceptance for.  Each JS mutation bumps it; each render decrements.
// This prevents Python's stale echo from overwriting JS's local state.
// With st.rerun() on the Python side, an "update" causes TWO renders:
//   render 1 = stale echo (before Python processed the value) — skip
//   render 2 = correct echo (after st.rerun with updated state) — accept
let _skipRenders=0;

function notify(action){
  if(!window.Streamlit)return;
  if(action==='update') _skipRenders=1; // skip one stale echo; accept the rerun
  const items=S.ds&&S.datasets[S.ds]?S.datasets[S.ds]:[];
  const txt=S.ds?(items[S.dsIdx]||''):S.custom;
  Streamlit.setComponentValue({
    pipeline:S.pipeline.map(n=>({id:n.id,type:n.type})),
    action,datasetText:txt,query:S.query,dataset:S.ds,
    datasetItem:S.dsIdx,customText:S.custom,
    nodeSettings:S.nodeSettings
  });
}

let rendered=false;
function onRender(event){
  const a=event.detail.args;
  if(a.nodeTypes)S.nodeTypes=a.nodeTypes;
  if(a.datasets)S.datasets=a.datasets;
  if(a.theme)S.theme=a.theme;

  if(_skipRenders>0){
    // JS has a pending local change — skip stale pipeline from Python.
    _skipRenders--;
  }else{
    // Safe to accept: recipe load, page reload, run results, or
    // the confirmed echo after Python processed our update.
    if(a.pipeline)S.pipeline=a.pipeline;
  }

  if(a.results)S.results=a.results;
  if(!rendered){
    S.ds=a.initDs||'';S.dsIdx=a.initDsIdx||0;
    S.query=a.initQuery||'';S.custom=a.initCustom||'';
  }
  render();rendered=true;
}

function init(){
  Streamlit.setComponentReady();
  Streamlit.events.addEventListener(Streamlit.RENDER_EVENT,onRender);
  Streamlit.setFrameHeight(620);
}
init();
</script>
