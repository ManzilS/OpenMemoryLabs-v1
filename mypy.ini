# mypy.ini — OpenMemoryLab static type checking configuration
#
# Run:  mypy oml/
# CI:   see .github/workflows/ci.yml (mypy step)
#
# Strategy: strict on the core TEEG + API + retrieval modules;
# permissive on legacy/third-party-heavy modules (storage backends,
# eval tasks, app UI) where the return-type density doesn't justify
# the annotation overhead yet.

[mypy]
python_version = 3.12

# Errors, not warnings, for missing annotations in checked modules
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True

# Warn when returning Any implicitly
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True

# Don't error on missing stubs for third-party libraries
ignore_missing_imports = True

# Show error codes for easy suppression where needed
show_error_codes = True

# Exclude generated / UI / legacy files that aren't annotated yet
exclude = [
    "oml/app/ui\\.py",
    "oml/eval/datasets/",
    "scripts/",
    "tests/",
]

# ── Module-level overrides ────────────────────────────────────────────────────

# Core TEEG modules — strictly typed
[mypy-oml.memory.*]
disallow_untyped_defs = True
warn_return_any = True

# Retrieval modules — strictly typed
[mypy-oml.retrieval.*]
disallow_untyped_defs = True
warn_return_any = True

# REST API — strictly typed (FastAPI relies on type hints for request validation)
[mypy-oml.api.*]
disallow_untyped_defs = True
warn_return_any = True

# LLM factory and clients — typed
[mypy-oml.llm.*]
disallow_untyped_defs = True

# Eval tasks — relax (many use dynamic dict configs)
[mypy-oml.eval.*]
disallow_untyped_defs = False
warn_return_any = False

# Storage backends — relax (heavy SQLAlchemy + LanceDB interop)
[mypy-oml.storage.*]
disallow_untyped_defs = False
ignore_missing_imports = True
